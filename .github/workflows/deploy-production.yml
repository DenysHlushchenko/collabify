name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Build workflow run ID containing the frontend-dist artifact"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend-production:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set lowercase repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create app directory on Production EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/app

      - name: Copy files to Production EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_backend.sh,docker-compose.prod.yml"
          target: "~/app"

      - name: Deploy backend to Production
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DB_HOST: ${{ secrets.DATABASE_HOST }}
          DB_PORT: ${{ secrets.DATABASE_PORT }}
          DB_NAME: ${{ secrets.DATABASE_NAME }}
          DB_USER: ${{ secrets.DATABASE_USERNAME }}
          DB_PASS: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,GHCR_USERNAME,GHCR_TOKEN,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASS,JWT_SECRET,FRONTEND_URL,NODE_ENV
          script: |
            cd ~/app
            cat > .env.production << EOF
            DATABASE_HOST=$DB_HOST
            DATABASE_PORT=$DB_PORT
            DATABASE=$DB_NAME
            DATABASE_USERNAME=$DB_USER
            DATABASE_PASSWORD=$DB_PASS
            JWT_SECRET_KEY=$JWT_SECRET
            SERVER_PORT=5000
            FRONTEND_URL=$FRONTEND_URL
            NODE_ENV=production
            EOF
            chmod +x ./deploy_backend.sh
            ./deploy_backend.sh

  deploy-frontend-production:
    environment: production
    needs: deploy-backend-production
    runs-on: ubuntu-latest
    steps:
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-production
          path: dist
          run-id: ${{ github.event.inputs.build_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # - name: Deploy to Production S3
      #   run: aws s3 sync ./dist s3://${{ secrets.AWS_S3_BUCKET }} --delete

  notify-deployment:
    if: always()
    needs: [deploy-backend-production, deploy-frontend-production]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Status
        run: |
          echo "Production deployment completed"
