name: Deploy

on:
  pull_request:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend:
    if: github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set lowercase repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create app directory on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: mkdir -p ~/app

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy_backend.sh,docker-compose.prod.yml"
          target: "~/app"

      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DB_HOST: ${{ secrets.DATABASE_HOST }}
          DB_PORT: ${{ secrets.DATABASE_PORT }}
          DB_NAME: ${{ secrets.DATABASE_NAME }}
          DB_USER: ${{ secrets.DATABASE_USERNAME }}
          DB_PASS: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE,GHCR_USERNAME,GHCR_TOKEN,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASS,JWT_SECRET
          script: |
            cd ~/app
            cat > .env.docker << EOF
            DATABASE_HOST=$DB_HOST
            DATABASE_PORT=$DB_PORT
            DATABASE=$DB_NAME
            DATABASE_USERNAME=$DB_USER
            DATABASE_PASSWORD=$DB_PASS
            JWT_SECRET_KEY=$JWT_SECRET
            SERVER_PORT=5000
            NODE_ENV=production
            EOF
            chmod +x ./deploy_backend.sh
            ./deploy_backend.sh

# References
# https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
