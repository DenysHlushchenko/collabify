name: Build

on:
    pull_request:
    workflow_run:
        workflows: ["CI"]
        types: [completed]

env:
    REGISTRY: ghcr.io
    BACKEND_IMAGE_NAME: ${{ github.repository }}/backend
    CLIENT_IMAGE_NAME: ${{ github.repository }}/frontend
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    build-and-push-backend:
        if: github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,format=short

            - name: Build and push backend image
              uses: docker/build-push-action@v6
              with:
                  context: ./server
                  file: ./server/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    build-and-push-frontend:
        if: github.event_name == 'pull_request' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,format=short

            - name: Build and push frontend image
              uses: docker/build-push-action@v6
              with:
                  context: ./client
                  file: ./client/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

# References
# https://github.com/docker/build-push-action
# https://github.com/actions/setup-node
# https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
