name: Deploy Acceptance

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-backend-acceptance:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set lowercase repository name
        id: repo
        run: echo "name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Create app directory on Acceptance EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ACCEPTANCE_EC2_HOST }}
          username: ${{ secrets.ACCEPTANCE_EC2_USER }}
          key: ${{ secrets.ACCEPTANCE_EC2_SSH_KEY }}
          script: mkdir -p ~/app

      - name: Copy files to Acceptance EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ACCEPTANCE_EC2_HOST }}
          username: ${{ secrets.ACCEPTANCE_EC2_USER }}
          key: ${{ secrets.ACCEPTANCE_EC2_SSH_KEY }}
          source: "deploy_backend.sh,docker-compose.prod.yml"
          target: "~/app"

      - name: Deploy backend to Acceptance
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DB_HOST: ${{ secrets.ACCEPTANCE_DATABASE_HOST }}
          DB_PORT: ${{ secrets.ACCEPTANCE_DATABASE_PORT }}
          DB_NAME: ${{ secrets.ACCEPTANCE_DATABASE_NAME }}
          DB_USER: ${{ secrets.ACCEPTANCE_DATABASE_USERNAME }}
          DB_PASS: ${{ secrets.ACCEPTANCE_DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.ACCEPTANCE_JWT_SECRET_KEY }}
          FRONTEND_URL: ${{ secrets.ACCEPTANCE_FRONTEND_URL }}
        with:
          host: ${{ secrets.ACCEPTANCE_EC2_HOST }}
          username: ${{ secrets.ACCEPTANCE_EC2_USER }}
          key: ${{ secrets.ACCEPTANCE_EC2_SSH_KEY }}
          envs: IMAGE,GHCR_USERNAME,GHCR_TOKEN,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASS,JWT_SECRET,FRONTEND_URL,NODE_ENV
          script: |
            cd ~/app
            cat > .env.production << EOF
            DATABASE_HOST=$DB_HOST
            DATABASE_PORT=$DB_PORT
            DATABASE=$DB_NAME
            DATABASE_USERNAME=$DB_USER
            DATABASE_PASSWORD=$DB_PASS
            JWT_SECRET_KEY=$JWT_SECRET
            SERVER_PORT=5000
            FRONTEND_URL=$FRONTEND_URL
            NODE_ENV=production
            EOF
            chmod +x ./deploy_backend.sh
            ./deploy_backend.sh

  deploy-frontend-acceptance:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    needs: deploy-backend-acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials for Acceptance
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # - name: Deploy to Acceptance S3
      #   run: aws s3 sync ./dist s3://${{ secrets.ACCEPTANCE_AWS_S3_BUCKET }} --delete

  verify-acceptance:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    needs: [deploy-backend-acceptance, deploy-frontend-acceptance]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for backend to be ready
        run: sleep 15

      - name: Health Check - Backend API
        run: |
          HEALTH_URL="http://${{ secrets.ACCEPTANCE_EC2_HOST }}:5000/health"
          echo "Checking health endpoint: $HEALTH_URL"

          for i in {1..30}; do
            echo "Attempt $i/30..."
            if curl -sf "$HEALTH_URL" > /dev/null 2>&1; then
              echo "✅ Backend is healthy!"
              curl -s "$HEALTH_URL" | jq .
              exit 0
            fi
            sleep 2
          done

          echo "❌ Backend health check failed after 60 seconds"
          exit 1

      - name: Verify Frontend Deployment
        run: |
          S3_BUCKET="${{ secrets.ACCEPTANCE_AWS_S3_BUCKET }}"
          echo "✅ Frontend deployed to S3 bucket: $S3_BUCKET"
          echo "Frontend URL: https://$S3_BUCKET.s3.amazonaws.com/index.html"

      - name: API Smoke Tests
        run: |
          BACKEND_URL="http://${{ secrets.ACCEPTANCE_EC2_HOST }}:5000"
          echo "Running smoke tests against: $BACKEND_URL"

          echo "Test 1: GET /health"
          curl -sf "$BACKEND_URL/health" | jq . || exit 1
          echo "✅ Health endpoint OK"
          echo "✅ All smoke tests passed"

      - name: Deployment Summary
        run: |
          echo "🎉 Acceptance Environment Deployment Complete"
          echo "================================"
          echo "Backend URL: http://${{ secrets.ACCEPTANCE_EC2_HOST }}:5000"
          echo "Health Check: http://${{ secrets.ACCEPTANCE_EC2_HOST }}:5000/health"
          echo "Frontend Bucket: ${{ secrets.ACCEPTANCE_AWS_S3_BUCKET }}"
          echo "================================"
          echo "Ready for manual testing!"
