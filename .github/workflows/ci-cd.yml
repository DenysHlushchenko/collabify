name: CI-CD pipeline

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 25
            - name: Install dependencies
              run: |
                  cd client && npm ci
                  cd ../server && npm ci
            - name: Run lint
              run: |
                  cd client && npm run lint
                  cd ../server && npm run lint

    test:
        runs-on: ubuntu-latest
        needs:
            - lint
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 25
            - name: Install dependencies
              run: |
                  cd client && npm ci
                  cd ../server && npm ci
            - name: Run tests
              run: cd server && npm run test

    build:
        runs-on: ubuntu-latest
        needs:
            - lint
            - test
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 25
            - name: Install dependencies and build
              run: |
                  cd client && npm ci && npm run build
                  cd ../server && npm ci && npm run build
            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: |
                      client/dist/
                      server/dist/

    release:
        needs:
            - build
        runs-on: ubuntu-latest
        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Use artifact from build job
              uses: actions/download-artifact@v4
              with:
                  name: dist
            - id: create_release
              uses: DenysHlushchenko/collabify/@v5
              with:
                  title: Dev Build ${{ github.sha }}
                  tag: dev-${{ github.sha }}
                  prerelease: false
