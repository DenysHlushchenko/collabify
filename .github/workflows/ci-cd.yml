name: CI-CD pipeline

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 25
                  cache: "npm"
                  cache-dependency-path: |
                      client/package-lock.json
                      server/package-lock.json
            - name: Install dependencies
              run: |
                  cd client && npm ci
                  cd ../server && npm ci
            - name: Run lint
              run: |
                  cd client && npm run lint
                  cd ../server && npm run lint

    test:
        runs-on: ubuntu-latest
        needs:
            - lint
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 25
                  cache: "npm"
                  cache-dependency-path: |
                      client/package-lock.json
                      server/package-lock.json
            - name: Install dependencies
              run: |
                  cd client && npm ci
                  cd ../server && npm ci
            - name: Run tests
              run: cd server && npm run test

    build:
        runs-on: ubuntu-latest
        needs:
            - lint
            - test
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 25
                  cache: "npm"
                  cache-dependency-path: |
                      client/package-lock.json
                      server/package-lock.json
            - name: Install dependencies and build
              run: |
                  cd client && npm ci && npm run build
                  cd ../server && npm ci && npm run build
            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: |
                      client/dist/
                      server/dist/

    release:
        needs:
            - build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v5
            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Create dev release + upload artifacts
              uses: softprops/action-gh-release@v2
              with:
                  title: Dev Build ${{ github.sha }}
                  tag_name: dev-${{ github.sha }}
                  files: |
                      dist/client/dist/**/*
                      dist/server/dist/**/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
