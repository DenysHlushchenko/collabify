services:
    client:
        build:
            context: ./client
            dockerfile: Dockerfile
        ports:
            - "80:80"
        depends_on:
            - server

    server:
        build:
            context: ./server
            dockerfile: Dockerfile
        ports:
            - "5000:5000"
        volumes:
            - ./server:/usr/src/app
            - /usr/src/app/node_modules
        depends_on:
            - database
        env_file: .env.production

    database:
        image: postgres:16-alpine
        ports:
            - "5433:5432"
        environment:
            - POSTGRES_DB=${DATABASE}
            - POSTGRES_USER=${DATABASE_USERNAME}
            - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
        volumes:
            - pgdata:/var/lib/postgresql/data
        env_file: .env.production

    seeder:
        build:
            context: ./server
            dockerfile: Dockerfile
        depends_on:
            - database
        command: npm run seed
        restart: "no"
        env_file: .env.production

volumes:
    pgdata:
