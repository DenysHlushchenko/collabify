services:
    server:
        image: ${IMAGE}
        container_name: collabify-backend
        ports:
            - "5000:5000"
            - "5001:5001"
        env_file: .env.production
        restart: unless-stopped

    client:
        image: ghcr.io/${{ github.repository }}/frontend:latest-production
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./client/nginx.conf:/etc/nginx/conf.d/default.conf
            - certbot_certs:/etc/letsencrypt
            - webroot:/var/www/html
        depends_on:
            - server
        restart: unless-stopped

    certbot:
        image: certbot/certbot
        command: sleep 1d
        volumes:
            - certbot_certs:/etc/letsencrypt
            - webroot:/var/www/html
        restart: "no"

volumes:
    certbot_certs:
    webroot:
